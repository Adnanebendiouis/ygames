<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow circles -->
  <circle cx="200" cy="150" r="180" fill="#7b2ff7" opacity="0.08"/>
  <circle cx="1050" cy="480" r="200" fill="#00d4ff" opacity="0.06"/>

  <!-- Accent bar -->
  <rect x="100" y="280" width="6" height="90" fill="url(#accent)" rx="3"/>

  <!-- Brand name -->
  <text x="130" y="352" font-family="'Arial Black', Arial, sans-serif" font-size="96" font-weight="900" fill="#ffffff" letter-spacing="-2">YGAMES</text>

  <!-- Accent underline -->
  <rect x="130" y="370" width="480" height="4" fill="url(#accent)" rx="2"/>

  <!-- Tagline -->
  <text x="130" y="430" font-family="Arial, sans-serif" font-size="28" fill="#a0b4cc" letter-spacing="1">Boutique jeux vidéo · Tlemcen, Algérie</text>

  <!-- Category pills -->
  <rect x="130" y="468" width="130" height="38" rx="19" fill="#7b2ff7" opacity="0.7"/>
  <text x="195" y="492" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">PlayStation</text>

  <rect x="276" y="468" width="80" height="38" rx="19" fill="#0a6abf" opacity="0.8"/>
  <text x="316" y="492" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Xbox</text>

  <rect x="370" y="468" width="100" height="38" rx="19" fill="#c41230" opacity="0.8"/>
  <text x="420" y="492" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Nintendo</text>

  <rect x="484" y="468" width="110" height="38" rx="19" fill="#2a6e4e" opacity="0.8"/>
  <text x="539" y="492" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Figurines</text>

  <!-- Website -->
  <text x="130" y="560" font-family="Arial, sans-serif" font-size="22" fill="#7b2ff7" letter-spacing="1">www.ygames.shop</text>

  <!-- Decorative controller icon (simplified) -->
  <g transform="translate(900, 240)" opacity="0.15">
    <rect x="0" y="40" width="200" height="120" rx="60" fill="#ffffff"/>
    <circle cx="60" cy="100" r="20" fill="#0a0a1a"/>
    <circle cx="140" cy="100" r="20" fill="#0a0a1a"/>
    <rect x="85" y="75" width="30" height="8" rx="4" fill="#0a0a1a"/>
    <rect x="95" y="65" width="10" height="28" rx="4" fill="#0a0a1a"/>
  </g>
</svg>
